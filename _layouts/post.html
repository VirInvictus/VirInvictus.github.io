---
layout: default
---
<article class="post">
  <header class="post__header">
    <p class="post__chapter">From the marginalia</p>
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %e, %Y" }}</time>
  </header>
  {{ content }}
  <p class="post__back"><a href="{{ '/' | relative_url }}">← Return to the codex</a></p>
</article>
