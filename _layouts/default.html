<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <main class="terminal" role="main">
    <header class="terminal__titlebar" aria-hidden="true">
      <span class="terminal__title">bdkl@fedora: ~</span>
      <span class="terminal__controls">
        <span class="winbtn winbtn--min" title="Minimize">
          <svg viewBox="0 0 16 16"><path d="M3.5 8h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
        <span class="winbtn winbtn--max" title="Maximize">
          <svg viewBox="0 0 16 16"><rect x="3.75" y="3.75" width="8.5" height="8.5" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
        </span>
        <span class="winbtn winbtn--close" title="Close">
          <svg viewBox="0 0 16 16"><path d="M4.5 4.5l7 7M11.5 4.5l-7 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </span>
      </span>
    </header>
    <article class="terminal__body">
      {{ content }}
      <p class="terminal__prompt-line" aria-hidden="true">
        <span class="prompt-user">bdkl@fedora</span><span class="prompt-sep">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span><span class="cursor"></span>
      </p>
    </article>
  </main>
</body>
</html>
